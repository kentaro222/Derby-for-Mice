<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ネズミダービー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        
        body {
            font-family: 'DotGothic16', sans-serif;
            background-color: #000;
            color: #fff;
            touch-action: manipulation;
        }

        .mouse-sprite {
            width: 16px;
            height: 16px;
            background-image: url('mouses_run_sheet.png');
            background-repeat: no-repeat;
            image-rendering: pixelated;
            transform: scale(3);
            transform-origin: bottom center;
        }

        .cheese-sprite {
            width: 16px;
            height: 16px;
            background-image: url('cheese.png');
            background-repeat: no-repeat;
            image-rendering: pixelated;
            transform: scale(3);
            transform-origin: bottom center;
        }
    </style>
</head>
<body class="py-4 px-2 sm:py-8 sm:px-4 flex justify-center items-start min-h-screen">

    <!-- ゲーム全体コンテナ (枠線廃止) -->
    <div id="app" class="w-full max-w-2xl bg-black overflow-hidden">
        
        <!-- ヘッダー -->
        <div class="bg-gray-900 p-4 flex justify-between items-center">
            <h1 class="text-xl sm:text-2xl tracking-widest text-white">ネズミダービー</h1>
            <div class="text-lg sm:text-xl px-4 py-1.5 bg-gray-800 flex items-center gap-2">
                COIN: <span id="coin-display" class="text-2xl text-yellow-400">---</span>
            </div>
        </div>

        <!-- レーストラックエリア (下の余白を削減) -->
        <div class="px-3 pt-3 pb-1 sm:px-5 sm:pt-5 sm:pb-2 bg-black">
            <div id="track" class="relative w-full h-[260px] bg-black overflow-hidden">
                <!-- レーンの足元の線 -->
                <div id="lane-lines-container" class="absolute inset-0 z-0"></div>
                <!-- チーズコンテナ -->
                <div id="cheese-container" class="absolute right-[10%] top-0 bottom-0 w-[16px] z-0"></div>
                <!-- ネズミコンテナ -->
                <div id="mouses-container" class="absolute inset-0 z-10"></div>
            </div>
        </div>

        <!-- コントロールパネル (上の余白を削減し、要素を上に寄せる) -->
        <div id="control-panel" class="px-6 pb-6 pt-2 bg-black min-h-[220px] flex flex-col items-center justify-start">
            <!-- JS Injection -->
        </div>

    </div>

<script>
    // --- 進行状況セーブ（ローカルストレージ）設定 ---
    const SAVE_KEY = 'mouse_derby_save_data';

    function loadData() {
        try {
            const saved = localStorage.getItem(SAVE_KEY);
            if (saved) {
                const data = JSON.parse(saved);
                if (typeof data.coins === 'number') {
                    coins = data.coins;
                    if (betAmount > coins) betAmount = Math.max(10, coins); // ベット額を所持金に合わせて調整
                }
            }
        } catch (e) {
            console.error("Load error:", e);
        }
        updateCoinsDisplay();
    }

    function saveData() {
        try {
            localStorage.setItem(SAVE_KEY, JSON.stringify({ coins: coins }));
        } catch (e) {
            console.error("Save error:", e);
        }
    }

    // --- データ定義 ---
    const mouseNames = ['レッド', 'ブルー', 'イエロー', 'グリーン', 'オレンジ', 'ピンク'];
    const bgColors = ['bg-red-900', 'bg-blue-900', 'bg-yellow-900', 'bg-green-900', 'bg-orange-900', 'bg-pink-900'];
    const badgeColors = ['bg-red-500', 'bg-blue-500', 'bg-yellow-400', 'bg-green-500', 'bg-orange-500', 'bg-pink-500'];
    const textColors = ['text-red-400', 'text-blue-400', 'text-yellow-400', 'text-green-400', 'text-orange-400', 'text-pink-400'];

    // --- 状態管理 ---
    let coins = 100;
    let betMouseId = 0;
    let betAmount = 10;
    let state = 'BETTING'; 
    let mouses = [];
    
    let lastTime = 0;
    let animationTimer = 0;
    let goalX = 0;
    let isImageLoaded = true;
    
    const animSeq = [0, 1, 0, 2];
    let animIndex = 0;

    // --- 初期化 ---
    function init() {
        loadData(); // ローカルストレージからデータ読み込み
        
        const img = new Image();
        img.onload = () => { isImageLoaded = true; setupMouses(); generateOdds(); renderControls(); };
        img.onerror = () => { isImageLoaded = false; setupMouses(); generateOdds(); renderControls(); };
        img.src = 'mouses_run_sheet.png';
    }

    // ネズミDOM生成
    function setupMouses() {
        mouses = [];
        const container = document.getElementById('mouses-container');
        container.innerHTML = '';
        const linesContainer = document.getElementById('lane-lines-container');
        if (linesContainer) linesContainer.innerHTML = '';
        const cheeseContainer = document.getElementById('cheese-container');
        if (cheeseContainer) cheeseContainer.innerHTML = '';

        const laneSpacing = 28; 
        const trackPaddingTop = 60; 

        for(let i = 0; i < 6; i++) {
            const baseY = trackPaddingTop + (i * laneSpacing);

            if (linesContainer) {
                const line = document.createElement('div');
                line.className = 'absolute left-0 right-0 border-b border-gray-600';
                line.style.top = `${baseY}px`;
                linesContainer.appendChild(line);
            }

            if (cheeseContainer) {
                const cheese = document.createElement('div');
                cheese.className = `absolute cheese-sprite ${!isImageLoaded ? 'hidden' : ''}`;
                cheese.style.top = `${baseY - 16}px`;
                cheese.style.left = '0px';
                cheese.style.zIndex = 10 + i * 2;
                cheeseContainer.appendChild(cheese);
                
                const fallback = document.createElement('div');
                fallback.className = `absolute w-[16px] h-[16px] bg-yellow-500 transform scale-[3] origin-bottom ${isImageLoaded ? 'hidden' : ''}`;
                fallback.style.top = `${baseY - 16}px`;
                fallback.style.left = '0px';
                fallback.style.zIndex = 10 + i * 2;
                cheeseContainer.appendChild(fallback);
            }

            mouses.push({
                id: i,
                x: 10,
                y: baseY,
                frame: 0,
                power: 50,
                odds: 2.0,
                speedProfile: {} 
            });

            const el = document.createElement('div');
            el.className = 'absolute transition-transform duration-75 ease-linear';
            el.style.top = `${mouses[i].y - 16}px`;
            el.style.left = `0px`;
            el.style.transform = `translateX(10px)`;
            el.style.zIndex = 10 + i * 2 + 1;
            el.id = `mouse-el-${i}`;

            const sprite = document.createElement('div');
            sprite.className = `mouse-sprite ${!isImageLoaded ? 'hidden' : ''}`;
            sprite.id = `mouse-sprite-${i}`;
            
            const fallback = document.createElement('div');
            fallback.className = `w-[16px] h-[16px] rounded-full flex items-center justify-center text-white text-[8px] font-bold transform scale-[3] origin-bottom ${badgeColors[i]} ${isImageLoaded ? 'hidden' : ''}`;
            fallback.innerText = mouseNames[i][0];

            el.appendChild(sprite);
            el.appendChild(fallback);
            container.appendChild(el);
        }
        updateMouseStyles();
    }

    // オッズと能力の計算 (よりシビアに調整)
    function generateOdds() {
        let totalPower = 0;
        // 各ネズミのパワーをランダムに決定 (20〜99)
        mouses.forEach(m => {
            m.power = Math.floor(Math.random() * 80) + 20;
            totalPower += m.power;
        });

        mouses.forEach(m => {
            // 還元率(控除率)を下げてシビアに (0.9 -> 0.75)
            let rawOdds = (totalPower / m.power) * 0.75; 
            m.odds = Math.max(1.2, Math.round(rawOdds * 10) / 10);
            
            // パワーに応じて実際のスピードパラメータを設定
            // 基礎スピードの差を縮め、ランダム要素を強める
            m.speedProfile = {
                base: (m.power / 100) * 0.25 + 0.4, // 速さのベース (0.45 ~ 0.65)
                // パワーが低いネズミほどスパート時の爆発力が高くなる（大穴の一発逆転狙い）
                spurt: ((100 - m.power) / 100) * 1.2 + 0.2, 
                spurtChance: Math.random() * 0.06 + 0.02 // スパート確率
            };
        });
    }

    function updateMouseStyles() {
        mouses.forEach(mouse => {
            const el = document.getElementById(`mouse-el-${mouse.id}`);
            if(el) {
                el.style.transform = `translateX(${mouse.x}px)`;
            }
            if(isImageLoaded) {
                const sprite = document.getElementById(`mouse-sprite-${mouse.id}`);
                if(sprite) {
                    const bpX = -(mouse.frame * 16);
                    const bpY = -(mouse.id * 16);
                    sprite.style.backgroundPosition = `${bpX}px ${bpY}px`;
                }
            }
        });
    }

    // 表示のみ更新
    function updateCoinsDisplay() {
        document.getElementById('coin-display').innerText = coins;
    }

    // 表示を更新し、セーブも行う
    function updateCoins() {
        updateCoinsDisplay();
        saveData();
    }

    // --- レース開始処理 ---
    async function startRace() {
        if (coins < betAmount) return;
        
        coins -= betAmount;
        updateCoins(); // ベット額を引いてセーブ
        
        const trackWidth = document.getElementById('track').clientWidth;
        goalX = trackWidth * 0.90 - 48; 

        state = 'READY';
        renderControls();
        updateMouseStyles();

        await new Promise(r => setTimeout(r, 1200));

        state = 'RACING';
        animIndex = 1;
        mouses.forEach(m => m.frame = animSeq[animIndex]);
        renderControls();
        
        lastTime = performance.now();
        requestAnimationFrame(gameLoop);
    }

    // --- メインループ ---
    function gameLoop(timestamp) {
        if (state !== 'RACING') return;
        
        const delta = timestamp - lastTime;
        lastTime = timestamp;

        let raceFinished = false;
        let winner = null;

        mouses.forEach(mouse => {
            let speed = mouse.speedProfile.base;
            
            if (Math.random() < mouse.speedProfile.spurtChance) {
                speed += mouse.speedProfile.spurt;
            }
            
            // 毎フレームの揺らぎを少し大きくして番狂わせを増やす
            speed += (Math.random() - 0.5) * 0.4;

            const safeDelta = Math.min(delta, 32); 
            mouse.x += speed * (safeDelta / 16);

            if (mouse.x >= goalX) {
                mouse.x = goalX;
                raceFinished = true;
                if (!winner || mouse.x > winner.x) {
                    winner = mouse;
                }
            }
        });

        animationTimer += delta;
        if (animationTimer > 100) {
            animIndex = (animIndex + 1) % animSeq.length;
            mouses.forEach(mouse => {
                mouse.frame = animSeq[animIndex];
            });
            animationTimer = 0;
        }

        updateMouseStyles();

        if (raceFinished) {
            state = 'FINISHED';
            mouses.forEach(mouse => mouse.frame = 0);
            updateMouseStyles();
            showResult(winner);
        } else {
            requestAnimationFrame(gameLoop);
        }
    }

    // --- UI描画処理 ---
    function renderControls() {
        const panel = document.getElementById('control-panel');
        panel.innerHTML = '';

        if (state === 'BETTING') {
            // 要素間のマージン(mb-*)も少し減らして密集感を出す
            panel.innerHTML = `
                <h2 class="text-lg sm:text-xl mb-3 text-white">ヨソウ シテ クダサイ</h2>
                <div id="mouses-grid" class="flex flex-wrap justify-center gap-2 sm:gap-3 mb-4 w-full max-w-lg"></div>
                <div class="flex items-center gap-4 mb-4 bg-gray-900 p-2 sm:p-3">
                    <button id="btn-dec" class="w-10 h-10 bg-gray-800 hover:bg-gray-700 text-xl text-white">-</button>
                    <span class="text-lg sm:text-xl min-w-[100px] text-center">${betAmount} COIN</span>
                    <button id="btn-inc" class="w-10 h-10 bg-gray-800 hover:bg-gray-700 text-xl text-white">+</button>
                </div>
                <button id="btn-start" class="px-8 py-3 bg-gray-800 text-lg sm:text-xl text-white transition-transform ${coins >= betAmount ? 'hover:bg-gray-700 hover:scale-105' : 'opacity-50'}">
                    START
                </button>
            `;

            const grid = document.getElementById('mouses-grid');
            mouseNames.forEach((name, i) => {
                const btn = document.createElement('button');
                const isSelected = betMouseId === i;
                const m = mouses[i];
                btn.className = `px-3 py-2 sm:px-4 sm:py-2 transition-all flex items-center ${isSelected ? bgColors[i] + ' text-white scale-105' : 'bg-gray-800 hover:bg-gray-700 text-gray-400'}`;
                // オッズを表示
                btn.innerHTML = `<span class="inline-block w-3 h-3 mr-2 ${badgeColors[i]}"></span>${name} <span class="ml-2 text-sm text-yellow-400">x${m.odds.toFixed(1)}</span>`;
                btn.onclick = () => { betMouseId = i; renderControls(); };
                grid.appendChild(btn);
            });

            document.getElementById('btn-dec').onclick = () => { betAmount = Math.max(10, betAmount - 10); renderControls(); };
            document.getElementById('btn-inc').onclick = () => { betAmount = Math.min(coins, betAmount + 10); renderControls(); };
            document.getElementById('btn-start').onclick = () => { if(coins >= betAmount) startRace(); };

        } else if (state === 'READY') {
            panel.innerHTML = `<h2 class="text-2xl sm:text-3xl text-white animate-bounce tracking-widest mt-4">READY...</h2>`;

        } else if (state === 'RACING') {
            panel.innerHTML = `
                <h2 class="text-xl sm:text-2xl mb-4 text-white animate-pulse mt-4">RACING...</h2>
                <p class="text-lg text-gray-400 mt-2">オウエンチュウ: <span class="${textColors[betMouseId]}">${mouseNames[betMouseId]}</span></p>
            `;
        }
    }

    // 結果発表
    function showResult(winner) {
        const panel = document.getElementById('control-panel');
        const isWin = winner.id === betMouseId;
        // オッズに基づいた賞金計算
        const prize = isWin ? Math.floor(betAmount * mouses[betMouseId].odds) : 0;
        
        if (isWin) {
            coins += prize;
            updateCoins(); // 賞金を加算してセーブ
        }

        panel.innerHTML = `
            <h2 class="text-2xl sm:text-3xl mb-2 mt-4 ${isWin ? 'text-yellow-400' : 'text-gray-500'}">
                ${isWin ? 'YOU WIN!!' : 'YOU LOSE...'}
            </h2>
            <p class="text-lg sm:text-xl mb-4 text-white">
                1チャク: <span class="${textColors[winner.id]}">${mouseNames[winner.id]}</span>
            </p>
            ${isWin ? `<div class="text-xl text-yellow-400 mb-4">+${prize} COIN (x${mouses[betMouseId].odds.toFixed(1)})</div>` : '<div class="h-8 mb-4"></div>'}
            <div id="next-action"></div>
        `;

        const actionDiv = document.getElementById('next-action');
        if (coins <= 0) {
            actionDiv.innerHTML = `<button id="btn-relief" class="px-8 py-3 text-lg sm:text-xl text-white bg-blue-900 hover:bg-blue-800">CONTINUE(50 COIN)</button>`;
            document.getElementById('btn-relief').onclick = () => {
                coins = 50;
                betAmount = 10;
                updateCoins(); // 救済コイン獲得時にセーブ
                resetRace();
            };
        } else {
            actionDiv.innerHTML = `<button id="btn-next" class="px-8 py-3 text-lg sm:text-xl text-white bg-gray-800 hover:bg-gray-700 transition-transform hover:scale-105">NEXT RACE</button>`;
            document.getElementById('btn-next').onclick = resetRace;
        }
    }

    function resetRace() {
        state = 'BETTING';
        if (betAmount > coins) betAmount = coins;
        if (betAmount < 10 && coins >= 10) betAmount = 10;
        
        mouses.forEach(m => {
            m.x = 10;
            m.frame = 0;
        });
        generateOdds(); // 次のレース用にオッズと能力を再生成
        updateMouseStyles();
        renderControls();
    }

    // 読み込み完了後に初期化を実行
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }

</script>
</body>
</html>
