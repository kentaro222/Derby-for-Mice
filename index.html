<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ネズミダービー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DotGothic16&display=swap');
        
        body {
            font-family: 'DotGothic16', sans-serif;
            background-color: #000;
            color: #fff;
            touch-action: manipulation;
        }

        .mouse-sprite {
            width: 16px;
            height: 16px;
            background-image: url('mouses_run_sheet.png');
            background-repeat: no-repeat;
            image-rendering: pixelated;
            transform-origin: bottom center;
        }

        .cheese-sprite {
            width: 16px;
            height: 16px;
            background-image: url('cheese.png');
            background-repeat: no-repeat;
            image-rendering: pixelated;
            transform: scale(3);
            transform-origin: bottom center;
        }
    </style>
</head>
<body class="py-4 px-2 sm:py-8 sm:px-4 flex justify-center items-start min-h-screen">

    <!-- ゲーム全体コンテナ -->
    <div id="app" class="w-full max-w-2xl bg-black overflow-hidden relative">
        
        <!-- コイン表示 (右上) -->
        <div class="absolute top-4 right-4 z-20 flex items-center gap-2 bg-black/80 px-3 py-1 rounded">
            <span class="text-gray-400">COIN:</span>
            <span id="coin-display" class="text-xl text-yellow-400">---</span>
        </div>

        <!-- レーストラックエリア -->
        <div class="pt-12 pb-2 px-3 sm:px-5 bg-black">
            <div id="track" class="relative w-full h-[260px] bg-black overflow-hidden">
                <!-- レーンの足元の線 -->
                <div id="lane-lines-container" class="absolute inset-0 z-0"></div>
                <!-- チーズコンテナ -->
                <div id="cheese-container" class="absolute right-[10%] top-0 bottom-0 w-[16px] z-0"></div>
                <!-- ネズミコンテナ -->
                <div id="mouses-container" class="absolute inset-0 z-10"></div>
            </div>
        </div>

        <!-- コントロールパネル -->
        <div id="control-panel" class="p-6 bg-black min-h-[200px] flex flex-col items-center justify-center">
            <!-- JS Injection -->
        </div>

    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // --- 進行状況セーブ（クラウド保存）設定 ---
    let db, auth;
    let isDataLoaded = false;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    async function initSaveSystem() {
        try {
            const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
            if (!firebaseConfig) {
                isDataLoaded = true;
                updateCoinsDisplay();
                return;
            }
            
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }

            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    await loadData(user.uid);
                    isDataLoaded = true;
                }
            });
        } catch (e) {
            console.error("Save system init error:", e);
            isDataLoaded = true;
            updateCoinsDisplay();
        }
    }

    async function loadData(uid) {
        if (!db) return;
        try {
            const docRef = doc(db, 'artifacts', appId, 'users', uid, 'gameData', 'saveData');
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                if (typeof data.coins === 'number') {
                    coins = data.coins;
                    if (betAmount > coins) betAmount = Math.max(10, coins);
                }
            }
        } catch (e) {
            console.error("Load error:", e);
        }
        updateCoinsDisplay();
        if (state === 'BETTING') renderControls();
    }

    async function saveData() {
        if (!isDataLoaded || !db || !auth || !auth.currentUser) return;
        try {
            const docRef = doc(db, 'artifacts', appId, 'users', auth.currentUser.uid, 'gameData', 'saveData');
            await setDoc(docRef, { coins: coins }, { merge: true });
        } catch (e) {
            console.error("Save error:", e);
        }
    }

    // --- データ定義 ---
    const badgeColors = ['bg-red-500', 'bg-blue-500', 'bg-yellow-400', 'bg-green-500', 'bg-orange-500', 'bg-pink-500'];

    // --- 状態管理 ---
    let coins = 100;
    let betMouseId = 0;
    let betAmount = 10;
    let state = 'BETTING'; 
    let mouses = [];
    
    let lastTime = 0;
    let animationTimer = 0;
    let goalX = 0;
    let isImageLoaded = true;
    let loopStarted = false;
    let winner = null;
    let isReturning = false;
    
    const animSeq = [0, 1, 0, 2];
    let animIndex = 0;

    // --- 初期化 ---
    function init() {
        initSaveSystem();
        
        const img = new Image();
        img.onload = () => { isImageLoaded = true; setup(); };
        img.onerror = () => { isImageLoaded = false; setup(); };
        img.src = 'mouses_run_sheet.png';

        function setup() {
            setupMouses(); 
            generateOdds(); 
            renderControls(); 
            if (!loopStarted) {
                loopStarted = true;
                lastTime = performance.now();
                requestAnimationFrame(gameLoop);
            }
        }
    }

    function setupMouses() {
        mouses = [];
        const container = document.getElementById('mouses-container');
        container.innerHTML = '';
        const linesContainer = document.getElementById('lane-lines-container');
        if (linesContainer) linesContainer.innerHTML = '';
        const cheeseContainer = document.getElementById('cheese-container');
        if (cheeseContainer) cheeseContainer.innerHTML = '';

        const laneSpacing = 28; 
        const trackPaddingTop = 60; 

        for(let i = 0; i < 6; i++) {
            const baseY = trackPaddingTop + (i * laneSpacing);

            if (linesContainer) {
                const line = document.createElement('div');
                line.className = 'absolute left-0 right-0 border-b border-gray-800';
                line.style.top = `${baseY}px`;
                linesContainer.appendChild(line);
            }

            if (cheeseContainer) {
                const cheese = document.createElement('div');
                cheese.className = `absolute cheese-sprite ${!isImageLoaded ? 'hidden' : ''}`;
                cheese.style.top = `${baseY - 16}px`;
                cheese.style.left = '0px';
                cheese.style.zIndex = 10 + i * 2;
                cheeseContainer.appendChild(cheese);
            }

            mouses.push({
                id: i,
                x: 10,
                y: baseY,
                frame: 0,
                power: 50,
                odds: 2.0,
                speedProfile: {},
                returnSpeed: 0
            });

            const el = document.createElement('div');
            el.className = 'absolute transition-transform duration-75 ease-linear';
            el.style.top = `${mouses[i].y - 16}px`;
            el.style.left = `0px`;
            el.style.transform = `translateX(10px)`;
            el.style.zIndex = 10 + i * 2 + 1;
            el.id = `mouse-el-${i}`;

            const sprite = document.createElement('div');
            sprite.className = `mouse-sprite ${!isImageLoaded ? 'hidden' : ''}`;
            sprite.id = `mouse-sprite-${i}`;
            
            const fallback = document.createElement('div');
            fallback.id = `mouse-fallback-${i}`;
            fallback.className = `w-[16px] h-[16px] rounded flex items-center justify-center transform origin-bottom ${badgeColors[i]} ${isImageLoaded ? 'hidden' : ''}`;

            el.appendChild(sprite);
            el.appendChild(fallback);
            container.appendChild(el);
        }
        updateMouseStyles();
    }

    function generateOdds() {
        let totalPower = 0;
        mouses.forEach(m => {
            m.power = Math.floor(Math.random() * 80) + 20;
            totalPower += m.power;
        });

        mouses.forEach(m => {
            // 還元率を全体で一律80%に設定し、大穴だけが得する状態を解消
            let houseEdge = 0.8; 
            let rawOdds = (totalPower / m.power) * houseEdge; 
            m.odds = Math.max(1.1, Math.round(rawOdds * 10) / 10);
            
            // スピードのバランス調整
            m.speedProfile = {
                // 本命(パワー高)の基礎速度を明確に速くする
                base: (m.power / 100) * 0.25 + 0.25, 
                // スパートの威力を控えめに（大穴でも一気に抜き去ることは少なくする）
                spurt: ((100 - m.power) / 100) * 0.8 + 0.2, 
                // スパート確率の差を縮める
                spurtChance: 0.015 + ((100 - m.power) / 100) * 0.02
            };
        });
    }

    function updateMouseStyles() {
        mouses.forEach(mouse => {
            const el = document.getElementById(`mouse-el-${mouse.id}`);
            if(el) {
                el.style.transform = `translateX(${mouse.x}px)`;
            }
            
            const scaleStr = (state === 'BETTING' && mouse.x > 10) ? 'scale(-3, 3)' : 'scale(3, 3)';

            if(isImageLoaded) {
                const sprite = document.getElementById(`mouse-sprite-${mouse.id}`);
                if(sprite) {
                    const bpX = -(mouse.frame * 16);
                    const bpY = -(mouse.id * 16);
                    sprite.style.backgroundPosition = `${bpX}px ${bpY}px`;
                    sprite.style.transform = scaleStr;
                }
            } else {
                const fallback = document.getElementById(`mouse-fallback-${mouse.id}`);
                if(fallback) {
                    fallback.style.transform = scaleStr;
                }
            }
        });
    }

    function updateCoinsDisplay() {
        document.getElementById('coin-display').innerText = coins;
    }

    function updateCoins() {
        updateCoinsDisplay();
        saveData();
    }

    async function startRace() {
        if (coins < betAmount || isReturning) return;
        
        coins -= betAmount;
        updateCoins();
        
        const trackWidth = document.getElementById('track').clientWidth;
        goalX = trackWidth * 0.90 - 48; 
        winner = null;

        state = 'READY';
        mouses.forEach(m => {
            m.x = 10;
            m.frame = 0;
        });
        renderControls();
        updateMouseStyles();

        await new Promise(r => setTimeout(r, 1200));

        state = 'RACING';
        animIndex = 1;
        mouses.forEach(m => m.frame = animSeq[animIndex]);
        renderControls();
    }

    function gameLoop(timestamp) {
        const delta = timestamp - lastTime;
        lastTime = timestamp;

        if (state === 'RACING') {
            let allFinished = true;

            mouses.forEach(mouse => {
                if (mouse.x < goalX) {
                    allFinished = false;
                    let speed = mouse.speedProfile.base;
                    
                    if (Math.random() < mouse.speedProfile.spurtChance) {
                        speed += mouse.speedProfile.spurt;
                    }
                    
                    // 毎フレームの揺らぎを抑え、基本は能力通りに走らせる
                    speed += (Math.random() - 0.5) * 0.3;

                    // 1.5%の確率で誰でもサボる(大きく減速) -> これが波乱を生む
                    if (Math.random() < 0.015) {
                        speed -= 0.4;
                    }

                    if (speed < 0.1) speed = 0.1;

                    const safeDelta = Math.min(delta, 32); 
                    mouse.x += speed * (safeDelta / 16);

                    if (mouse.x >= goalX) {
                        mouse.x = goalX;
                        if (!winner) {
                            winner = mouse;
                        }
                    }
                }
            });

            animationTimer += delta;
            if (animationTimer > 100) {
                animIndex = (animIndex + 1) % animSeq.length;
                mouses.forEach(mouse => {
                    if (mouse.x < goalX) {
                        mouse.frame = animSeq[animIndex];
                    } else {
                        mouse.frame = 0; 
                    }
                });
                animationTimer = 0;
            }

            if (allFinished) {
                state = 'FINISHED'; 
                showResult(winner);
            }

        } else if (state === 'BETTING') {
            let isMoving = false;
            mouses.forEach(mouse => {
                if (mouse.x > 10) {
                    isMoving = true;
                    const safeDelta = Math.min(delta, 32);
                    mouse.x -= mouse.returnSpeed * (safeDelta / 16);
                    if (mouse.x <= 10) {
                        mouse.x = 10;
                        mouse.frame = 0; 
                    }
                }
            });

            if (isMoving) {
                animationTimer += delta;
                if (animationTimer > 150) { 
                    animIndex = (animIndex + 1) % animSeq.length;
                    mouses.forEach(mouse => {
                        if (mouse.x > 10) {
                            mouse.frame = animSeq[animIndex];
                        }
                    });
                    animationTimer = 0;
                }
            } else if (isReturning) {
                isReturning = false;
                renderControls();
            }
        }

        updateMouseStyles();
        requestAnimationFrame(gameLoop);
    }

    function renderControls() {
        const panel = document.getElementById('control-panel');
        if (state === 'BETTING') {
            const canStart = coins >= betAmount && !isReturning;
            const btnClass = canStart ? 'hover:bg-gray-800 hover:scale-105' : 'opacity-50 cursor-not-allowed';
            const btnText = isReturning ? 'WAIT...' : 'START';

            panel.innerHTML = `
                <div id="mouses-grid" class="grid grid-cols-3 sm:flex sm:justify-center justify-items-center gap-2 sm:gap-3 mb-6 w-full max-w-xl mx-auto"></div>
                <div class="flex items-center gap-4 mb-6">
                    <button id="btn-dec" class="w-10 h-10 bg-gray-900 hover:bg-gray-800 text-xl text-white flex justify-center items-center rounded">-</button>
                    <span class="text-xl min-w-[80px] text-center">${betAmount}</span>
                    <button id="btn-inc" class="w-10 h-10 bg-gray-900 hover:bg-gray-800 text-xl text-white flex justify-center items-center rounded">+</button>
                </div>
                <button id="btn-start" class="px-10 py-3 bg-gray-900 text-xl text-white rounded transition-transform ${btnClass}">
                    ${btnText}
                </button>
            `;

            const grid = document.getElementById('mouses-grid');
            mouses.forEach((m, i) => {
                const btn = document.createElement('button');
                const isSelected = betMouseId === i;
                btn.className = `px-3 py-2 w-20 flex flex-col items-center justify-center gap-2 rounded transition-all ${isSelected ? 'bg-gray-800 border border-gray-600 scale-105' : 'bg-transparent hover:bg-gray-900'}`;
                btn.innerHTML = `
                    <span class="inline-block w-5 h-5 ${badgeColors[i]} rounded-sm"></span>
                    <span class="text-sm text-yellow-400">x${m.odds.toFixed(1)}</span>
                `;
                btn.onclick = () => { betMouseId = i; renderControls(); };
                grid.appendChild(btn);
            });

            document.getElementById('btn-dec').onclick = () => { betAmount = Math.max(10, betAmount - 10); renderControls(); };
            document.getElementById('btn-inc').onclick = () => { betAmount = Math.min(coins, betAmount + 10); renderControls(); };
            document.getElementById('btn-start').onclick = () => { if(canStart) startRace(); };

        } else if (state === 'READY') {
            panel.innerHTML = `<h2 class="text-2xl text-white animate-bounce tracking-widest mt-4">READY...</h2>`;

        } else if (state === 'RACING') {
            panel.innerHTML = `
                <h2 class="text-xl text-gray-500 mb-4 animate-pulse tracking-widest">RACING...</h2>
                <div class="flex items-center gap-3">
                    <span class="text-gray-400">BET:</span>
                    <span class="inline-block w-6 h-6 rounded-sm ${badgeColors[betMouseId]} shadow-[0_0_10px_rgba(255,255,255,0.2)]"></span>
                </div>
            `;
        }
    }

    function showResult(winMouse) {
        const panel = document.getElementById('control-panel');
        const isWin = winMouse.id === betMouseId;
        const prize = isWin ? Math.floor(betAmount * mouses[betMouseId].odds) : 0;
        
        if (isWin) {
            coins += prize;
            updateCoins();
        }

        panel.innerHTML = `
            <h2 class="text-2xl sm:text-3xl mb-4 tracking-widest ${isWin ? 'text-yellow-400' : 'text-gray-600'}">
                ${isWin ? 'YOU WIN!!' : 'YOU LOSE...'}
            </h2>
            <div class="flex items-center justify-center gap-4 mb-6">
                <span class="text-gray-400">WINNER:</span>
                <span class="inline-block w-6 h-6 rounded-sm ${badgeColors[winMouse.id]}"></span>
            </div>
            ${isWin ? `<div class="text-xl text-yellow-400 mb-6">+${prize} (x${mouses[betMouseId].odds.toFixed(1)})</div>` : '<div class="h-8 mb-6"></div>'}
            <div id="next-action"></div>
        `;

        const actionDiv = document.getElementById('next-action');
        if (coins <= 0) {
            actionDiv.innerHTML = `<button id="btn-relief" class="px-8 py-3 text-lg text-gray-400 bg-gray-900 hover:bg-gray-800 rounded tracking-widest">CONTINUE(50 COIN)</button>`;
            document.getElementById('btn-relief').onclick = () => {
                coins = 50;
                betAmount = 10;
                updateCoins(); 
                resetRace();
            };
        } else {
            actionDiv.innerHTML = `<button id="btn-next" class="px-8 py-3 text-lg text-white bg-gray-900 hover:bg-gray-800 rounded tracking-widest transition-transform hover:scale-105">NEXT</button>`;
            document.getElementById('btn-next').onclick = resetRace;
        }
    }

    function resetRace() {
        state = 'BETTING';
        isReturning = true;

        if (betAmount > coins) betAmount = coins;
        if (betAmount < 10 && coins >= 10) betAmount = 10;
        
        mouses.forEach(m => {
            m.returnSpeed = Math.random() * 0.4 + 0.6; 
        });
        
        generateOdds(); 
        updateMouseStyles();
        renderControls();
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }

</script>
</body>
</html>
